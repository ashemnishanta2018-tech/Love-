<!DOCTYPE html>
<html>
<head>
<title>For My Love ️<3</title>

<style>

body{
margin:0;
font-family: Arial;
text-align:center;
color:white;
background:url("https://i.ibb.co/zVyzbgQW/91a40be26e6fb77b6f6606646be93fb2.jpg");
background-size:cover;
background-position:center;
}

.overlay{
background:rgba(0,0,0,0.45);
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

h1{
font-size:50px;
}

p{
font-size:22px;
}

#timer{
font-size:28px;
margin-top:20px;
}

.heart{
position:fixed;
bottom:-20px;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-100vh);opacity:0;}
}

button{
padding:12px 25px;
border:none;
border-radius:20px;
font-size:18px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="overlay">

<h1>For The Love Of My Life️</h1>

<p>You are the most special person in my life.</p>

<p id="timer"></p>

</div>

<script>


var startDate = new Date("2022-05-26");

function updateTimer(){

var now = new Date();
var diff = now - startDate;

var days = Math.floor(diff/(1000*60*60*24));
var hours = Math.floor((diff/(1000*60*60))%24);
var minutes = Math.floor((diff/(1000*60))%60);

document.getElementById("timer").innerHTML =
"We have been together for "+days+" days "+hours+" hours "+minutes+" minutes";

}

setInterval(updateTimer,1000);


function createHeart(){

var heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

}

setInterval(createHeart,500);

</script>

</body>
</html>
